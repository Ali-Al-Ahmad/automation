services:
  postgres:
    image: postgres:16-alpine
    container_name: automation-postgres
    restart: unless-stopped
    env_file: .env_backend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-automation}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/automation-backend:${IMAGE_TAG:-latest}
    container_name: automation-backend
    restart: unless-stopped
    env_file: .env_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    image: ${DOCKER_USERNAME}/automation-frontend:${IMAGE_TAG:-latest}
    container_name: automation-frontend
    restart: unless-stopped
    env_file: .env_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
