name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/automation-backend:20
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/automation-frontend:20
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /home/${{ secrets.SERVER_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Render .env from secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: |
          set -euo pipefail
          : "${DOCKER_USERNAME:?DOCKER_USERNAME secret is required}"
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD secret is required}"
          : "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN secret is required}"
          : "${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID secret is required}"
          PG_USER="${POSTGRES_USER:-postgres}"
          PG_DB="${POSTGRES_DB:-automation}"
          {
            echo "# --- Compose interpolation (image names + postgres container) ---"
            echo "DOCKER_USERNAME=${DOCKER_USERNAME}"
            echo "POSTGRES_USER=${PG_USER}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DB=${PG_DB}"
            echo ""
            echo "# --- Backend runtime ---"
            echo "NODE_ENV=production"
            echo "PORT=3001"
            echo "DATABASE_URL=postgresql://${PG_USER}:${POSTGRES_PASSWORD}@postgres:5432/${PG_DB}?schema=public"
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}"
            echo "CORS_ORIGIN=${CORS_ORIGIN:-https://alialahmad.com}"
          } > .env
          chmod 644 .env

      - name: Clean stale nginx config path on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SECRET }}
          script: |
            set -euo pipefail
            cd "/home/${{ secrets.SERVER_USER }}"
            if [ -e nginx ] && [ ! -w nginx ]; then
              docker compose stop nginx 2>/dev/null || true
              docker compose rm -f nginx 2>/dev/null || true
              docker run --rm -v "$PWD:/x" alpine rm -rf /x/nginx
            fi

      - name: Copy compose + backend .env to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SECRET }}
          source: "docker-compose.yml,.env,nginx/default.conf"
          target: ${{ env.DEPLOY_DIR }}

      - name: Pull images & restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SECRET }}
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_DIR }}"
            chmod 600 .env
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            docker compose pull
            docker compose up -d --force-recreate nginx
            docker compose up -d
            echo "=== nginx running config ===" ; docker compose exec -T nginx cat /etc/nginx/conf.d/default.conf || docker compose logs --tail 30 nginx || true
            docker image prune -f
